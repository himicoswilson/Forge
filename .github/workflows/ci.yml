name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-debug-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-debug-${{ runner.os }}-
      - name: Build (including tests)
        run: swift build --build-tests
      - name: Test
        run: swift test --skip-build

  # Verifies the release configuration and the app-bundle script still work,
  # and publishes the resulting Forge.app as a downloadable artifact.
  app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-release-${{ runner.os }}-
      - name: Build Forge.app
        run: make app
      - name: Upload Forge.app
        uses: actions/upload-artifact@v4
        with:
          name: Forge.app
          path: Forge.app
          if-no-files-found: error
